apiVersion: apps/v1
kind: Deployment
metadata: { name: cloudbill, labels: { app: cloudbill } }
spec:
  replicas: 1
  selector: { matchLabels: { app: cloudbill } }
  template:
    metadata: { labels: { app: cloudbill } }
    spec:
      containers:
        - name: cloudbill
          image: ghcr.io/cognis-digital/cloudbill:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: cloudbill }
spec:
  selector: { app: cloudbill }
  ports: [{ port: 80, targetPort: 8000 }]
